services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    init: true
    network_mode: service:postgres
    volumes:
      - ..:/workspaces/progress-checker:cached
      # Reuse local credentials inside the dev container.
      - ${HOME}/.aws:/home/vscode/.aws:cached
      - ${HOME}/.claude:/home/vscode/.claude:cached
      # Keep persistent tool state between rebuilds. See .devcontainer/on-create.sh.
      - asdf:/home/vscode/.asdf
      - node_modules:/workspaces/progress-checker/node_modules
      - command-history:/commandhistory
    environment:
      HISTFILE: /commandhistory/.zsh_history
  elasticmq:
    image: softwaremill/elasticmq-native:1.6.9
    restart: unless-stopped
    network_mode: service:postgres
    depends_on:
      - postgres
    volumes:
      - ../elasticmq.conf:/opt/elasticmq.conf

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: progress_checker
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d progress_checker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  asdf:
  command-history:
  node_modules:
  postgres-data:
