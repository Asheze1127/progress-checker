name: Extract Closing Issue Numbers
description: Extract issue numbers referenced by closing keywords in a pull request title or body

inputs:
  pull-request-body:
    description: Pull request body
    required: true

outputs:
  issue-numbers:
    description: Space-separated issue numbers closed by the pull request
    value: ${{ steps.extract.outputs.result }}

runs:
  using: composite
  steps:
    - id: extract
      uses: actions/github-script@v7
      env:
        PR_BODY: ${{ inputs.pull-request-body }}
      with:
        result-encoding: string
        script: |
          const text = process.env.PR_BODY ?? "";

          const extractIssueNumbers = (pattern, text) =>
            [...text.matchAll(pattern)].flatMap((match) =>
              [...match[0].matchAll(/#(\d+)/g)].map((issueMatch) => Number(issueMatch[1])),
            );

          const issueNumbers = extractIssueNumbers(
            /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b:?\s+#\d+(?:(?:\s*,\s*|\s+and\s+)#\d+)*/gi,
            text,
          );

          return [...new Set(issueNumbers)].sort((left, right) => left - right).join(" ");
