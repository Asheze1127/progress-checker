name: Format Go

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/format-go.yml'

jobs:
  gofmt-check:
    name: gofmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check for go.mod
        id: gomod
        run: |
          if [ -f backend/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::backend/go.mod not found, skipping format check"
          fi

      - uses: actions/setup-go@v5
        if: steps.gomod.outputs.present == 'true'
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Check Go formatting
        if: steps.gomod.outputs.present == 'true'
        run: |
          unformatted=$(gofmt -l backend/)
          if [ -n "$unformatted" ]; then
            echo "::error::The following Go files are not formatted (run: gofmt -w <file>):"
            echo "$unformatted"
            gofmt -d backend/
            exit 1
          fi
          echo "All Go files are correctly formatted."
