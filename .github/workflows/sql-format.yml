name: SQL Format

on:
  pull_request:
    paths:
      - "backend/database/postgres/**/*.sql"

jobs:
  sql-format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: tools/sql/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SQL formatter
        working-directory: tools/sql
        run: pnpm install --frozen-lockfile

      - name: Run sql-format via make
        working-directory: tools/sql
        run: make sql-format

      - name: Verify SQL files are formatted
        working-directory: tools/sql
        run: |
          if [ -n "$(git status --short --untracked-files=all -- ../../backend/database/postgres)" ]; then
            git status --short -- ../../backend/database/postgres
            exit 1
          fi
